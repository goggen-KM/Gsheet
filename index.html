<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Supabase Viewer v001</title>
  <style>
    :root{--bg:#f6f7f9;--card:#fff;--line:#d9dee7;--text:#1f2937;--muted:#6b7280;--accent:#2563eb;--bad:#dc2626;--ok:#15803d;}
    body{margin:0;background:var(--bg);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);}
    header{background:#111827;color:#fff;padding:14px 18px;}
    header h1{font-size:18px;margin:0;} header .ver{font-size:12px;color:#cbd5e1;margin-top:4px;}
    main{max-width:1180px;margin:0 auto;padding:16px;}
    .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:14px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;}
    input,select,button{font:inherit;border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:#fff;box-sizing:border-box;}
    input,select{width:100%;}
    button{cursor:pointer;background:#fff;} button.primary{background:var(--accent);color:#fff;border-color:var(--accent);} button:disabled{opacity:.5;cursor:not-allowed;}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
    .status{font-size:13px;margin-top:8px;color:var(--muted);} .status.ok{color:var(--ok);} .status.err{color:var(--bad);white-space:pre-wrap;}
    table{border-collapse:collapse;width:100%;font-size:13px;background:#fff;}
    th,td{border:1px solid var(--line);padding:6px 8px;text-align:left;vertical-align:top;}
    th{background:#f3f4f6;position:sticky;top:0;z-index:1;}
    .table-wrap{max-height:420px;overflow:auto;border:1px solid var(--line);border-radius:8px;}
    .summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin:10px 0;}
    .pill{background:#f3f4f6;border:1px solid var(--line);border-radius:10px;padding:10px;}
    .pill b{display:block;font-size:18px;margin-top:4px;}
    .muted{color:var(--muted);font-size:12px;}
    .danger{color:var(--bad);} .hidden{display:none;}
    @media(max-width:760px){.grid{grid-template-columns:1fr}.summary{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
<header>
  <h1>Supabase Viewer</h1>
  <div class="ver">v001 / students・work_records 読み込み確認用</div>
</header>
<main>
  <section class="card">
    <h2 style="font-size:16px;margin:0 0 10px">接続設定</h2>
    <div class="grid">
      <div>
        <label for="url">Supabase Project URL</label>
        <input id="url" placeholder="https://xxxx.supabase.co" autocomplete="off" />
      </div>
      <div>
        <label for="key">anon public key</label>
        <input id="key" placeholder="eyJ..." autocomplete="off" />
      </div>
    </div>
    <div class="row" style="margin-top:10px">
      <button class="primary" id="saveBtn">設定を保存</button>
      <button id="loadStudentsBtn">学生一覧を読み込む</button>
      <button id="clearBtn">設定を消す</button>
    </div>
    <div id="connStatus" class="status">Project URL と anon public key を入力してください。Database password は使いません。</div>
  </section>

  <section class="card">
    <h2 style="font-size:16px;margin:0 0 10px">学生選択</h2>
    <div class="row">
      <select id="studentSelect" disabled><option value="">学生を選択してください</option></select>
      <button id="loadRecordsBtn" disabled>選択学生の記録を読む</button>
    </div>
    <div id="studentInfo" class="status"></div>
  </section>

  <section class="card" id="recordsCard">
    <h2 style="font-size:16px;margin:0 0 10px">勤務記録</h2>
    <div class="summary">
      <div class="pill"><span class="muted">件数</span><b id="sumCount">0</b></div>
      <div class="pill"><span class="muted">勤務日数</span><b id="sumWorkDays">0</b></div>
      <div class="pill"><span class="muted">なし</span><b id="sumNoneDays">0</b></div>
      <div class="pill"><span class="muted">合計時間</span><b id="sumHours">0.00</b></div>
    </div>
    <div class="row" style="margin-bottom:8px">
      <button id="exportCsvBtn" disabled>表示中データをCSV保存</button>
      <span class="muted">まずは読み込み確認用です。Excel/PDF出力は次版で追加できます。</span>
    </div>
    <div class="table-wrap">
      <table id="recordsTable">
        <thead>
          <tr>
            <th>日付</th><th>状態</th><th>アルバイト名</th><th>出勤</th><th>退勤</th><th>休憩</th><th>時間</th><th>上限</th><th>7日計</th><th>メモ</th>
          </tr>
        </thead>
        <tbody><tr><td colspan="10" class="muted">まだデータを読み込んでいません。</td></tr></tbody>
      </table>
    </div>
  </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const VERSION='supabase-viewer-v001';
const LS_KEY='supabase-viewer-v001-settings';
let client=null;
let students=[];
let currentRecords=[];
const $=id=>document.getElementById(id);

function setStatus(id,msg,type=''){
  const el=$(id); el.textContent=msg; el.className='status'+(type?' '+type:'');
}
function escapeHtml(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function normalizeTime(v){
  if(v==null || v==='') return '';
  const s=String(v);
  const m=s.match(/(\d{1,2}):(\d{2})/);
  return m ? String(m[1]).padStart(2,'0')+':'+m[2] : s;
}
function makeClient(){
  const url=$('url').value.trim();
  const key=$('key').value.trim();
  if(!url || !key) throw new Error('Supabase Project URL と anon public key を入力してください。');
  client=window.supabase.createClient(url,key);
  return client;
}
function saveSettings(){
  localStorage.setItem(LS_KEY,JSON.stringify({url:$('url').value.trim(),key:$('key').value.trim()}));
  setStatus('connStatus','設定を保存しました。','ok');
}
function loadSettings(){
  try{const s=JSON.parse(localStorage.getItem(LS_KEY)||'{}'); if(s.url)$('url').value=s.url; if(s.key)$('key').value=s.key;}catch(e){}
}
async function loadStudents(){
  try{
    setStatus('connStatus','学生一覧を読み込み中...');
    const sb=makeClient();
    const {data,error}=await sb.from('students').select('student_no,name,class_name,restore_code,created_at,updated_at').order('student_no',{ascending:true});
    if(error) throw error;
    students=data||[];
    const sel=$('studentSelect');
    sel.innerHTML='<option value="">学生を選択してください</option>';
    for(const st of students){
      const opt=document.createElement('option');
      opt.value=st.student_no;
      opt.textContent=`${st.student_no}　${st.name||''}　${st.class_name||''}`;
      sel.appendChild(opt);
    }
    sel.disabled=false; $('loadRecordsBtn').disabled=false;
    setStatus('connStatus',`学生一覧を読み込みました：${students.length}名`,'ok');
  }catch(e){
    setStatus('connStatus','ERROR\n'+(e.message||e),'err');
  }
}
async function loadRecords(){
  const studentNo=$('studentSelect').value;
  if(!studentNo){setStatus('studentInfo','学生を選択してください。','err');return;}
  const st=students.find(x=>x.student_no===studentNo)||{};
  setStatus('studentInfo',`${studentNo} ${st.name||''} の記録を読み込み中...`);
  try{
    const sb=makeClient();
    const {data,error}=await sb.from('work_records')
      .select('student_no,work_date,status,job_name,start_time,end_time,break_minutes,work_hours,limit_hours,seven_day_total,note,created_at,updated_at')
      .eq('student_no',studentNo)
      .order('work_date',{ascending:true});
    if(error) throw error;
    currentRecords=data||[];
    renderRecords(currentRecords);
    setStatus('studentInfo',`${studentNo} ${st.name||''}：${currentRecords.length}件を読み込みました。`,'ok');
    $('exportCsvBtn').disabled=currentRecords.length===0;
  }catch(e){
    setStatus('studentInfo','ERROR\n'+(e.message||e),'err');
  }
}
function renderRecords(rows){
  const tb=$('recordsTable').querySelector('tbody');
  if(!rows.length){tb.innerHTML='<tr><td colspan="10" class="muted">記録がありません。</td></tr>'; updateSummary([]); return;}
  tb.innerHTML=rows.map(r=>`<tr>
    <td>${escapeHtml(r.work_date)}</td>
    <td>${escapeHtml(r.status)}</td>
    <td>${escapeHtml(r.job_name||'')}</td>
    <td>${escapeHtml(normalizeTime(r.start_time))}</td>
    <td>${escapeHtml(normalizeTime(r.end_time))}</td>
    <td>${escapeHtml(r.break_minutes??'')}</td>
    <td>${escapeHtml(Number(r.work_hours||0).toFixed(2))}</td>
    <td>${escapeHtml(r.limit_hours==null?'':Number(r.limit_hours).toFixed(2))}</td>
    <td>${escapeHtml(r.seven_day_total==null?'':Number(r.seven_day_total).toFixed(2))}</td>
    <td>${escapeHtml(r.note||'')}</td>
  </tr>`).join('');
  updateSummary(rows);
}
function updateSummary(rows){
  const count=rows.length;
  const workDays=rows.filter(r=>r.status==='勤務' || Number(r.work_hours||0)>0).length;
  const noneDays=rows.filter(r=>r.status==='なし').length;
  const hours=rows.reduce((s,r)=>s+Number(r.work_hours||0),0);
  $('sumCount').textContent=count;
  $('sumWorkDays').textContent=workDays;
  $('sumNoneDays').textContent=noneDays;
  $('sumHours').textContent=hours.toFixed(2);
}
function exportCsv(){
  if(!currentRecords.length) return;
  const stNo=$('studentSelect').value;
  const headers=['student_no','work_date','status','job_name','start_time','end_time','break_minutes','work_hours','limit_hours','seven_day_total','note'];
  const lines=[headers.join(',')];
  for(const r of currentRecords){
    lines.push(headers.map(h=>{
      let v=(h==='start_time'||h==='end_time')?normalizeTime(r[h]):(r[h]??'');
      v=String(v).replace(/"/g,'""');
      return /[",\n]/.test(v)?`"${v}"`:v;
    }).join(','));
  }
  const blob=new Blob(['\ufeff'+lines.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`${stNo}_work_records_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
$('saveBtn').addEventListener('click',saveSettings);
$('loadStudentsBtn').addEventListener('click',loadStudents);
$('loadRecordsBtn').addEventListener('click',loadRecords);
$('exportCsvBtn').addEventListener('click',exportCsv);
$('clearBtn').addEventListener('click',()=>{localStorage.removeItem(LS_KEY); $('url').value=''; $('key').value=''; setStatus('connStatus','設定を消しました。');});
$('studentSelect').addEventListener('change',()=>{const st=students.find(x=>x.student_no===$('studentSelect').value); setStatus('studentInfo',st?`${st.student_no} ${st.name||''} ${st.class_name||''}`:'');});
loadSettings();
</script>
</body>
</html>
